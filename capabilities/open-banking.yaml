naftiko: "1.0.0-alpha1"

info:
  label: Teller Open Banking
  description: >-
    Unified open banking workflow combining account management, transaction history,
    balance monitoring, and identity verification through the Teller API. Enables
    fintech applications, personal finance tools, and lending platforms to access
    real-time financial data across US banks and credit unions.
  tags:
    - Accounts
    - Banking
    - Financial Data
    - FinTech
    - Identity Verification
    - Open Banking
    - Teller
    - Transactions
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELLER_ACCESS_TOKEN: TELLER_ACCESS_TOKEN

capability:
  consumes:
    - import: teller
      location: ./shared/teller.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: teller-open-banking-api
      description: >-
        Unified REST API for open banking data access including accounts, balances,
        transactions, and identity across US financial institutions.
      resources:
        - path: /v1/identity
          name: identity
          description: Account holder identity and ownership information
          operations:
            - method: GET
              name: list-identity
              description: List accounts with beneficial owner identity information
              call: "teller.list-identity"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/accounts
          name: accounts
          description: Bank accounts accessible via the current enrollment
          operations:
            - method: GET
              name: list-accounts
              description: List all authorized bank accounts
              call: "teller.list-accounts"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/accounts/{account_id}
          name: account
          description: Single bank account resource
          operations:
            - method: GET
              name: get-account
              description: Get a bank account by ID
              call: "teller.get-account"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{account_id}/details
          name: account-details
          description: Sensitive account number and routing details
          operations:
            - method: GET
              name: get-account-details
              description: Get routing number and account number
              call: "teller.get-account-details"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{account_id}/balances
          name: account-balances
          description: Real-time account balance data
          operations:
            - method: GET
              name: get-account-balances
              description: Get available and ledger balances
              call: "teller.get-account-balances"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{account_id}/transactions
          name: transactions
          description: Transaction history for a bank account
          operations:
            - method: GET
              name: list-transactions
              description: List transactions with optional date filtering and pagination
              call: "teller.list-transactions"
              with:
                account_id: "rest.account_id"
                count: "rest.count"
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/accounts/{account_id}/transactions/{transaction_id}
          name: transaction
          description: Single transaction record
          operations:
            - method: GET
              name: get-transaction
              description: Get a transaction by ID
              call: "teller.get-transaction"
              with:
                account_id: "rest.account_id"
                transaction_id: "rest.transaction_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/institutions
          name: institutions
          description: Supported financial institutions
          operations:
            - method: GET
              name: list-institutions
              description: List all supported banks and credit unions
              call: "teller.list-institutions"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: teller-open-banking-mcp
      transport: http
      description: >-
        MCP server for AI-assisted open banking data access and financial analysis
        across US banks and credit unions via Teller.
      tools:
        - name: list-identity
          description: List bank accounts with beneficial owner identity information
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-identity"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-accounts
          description: List all bank accounts authorized in the current Teller enrollment
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-accounts"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-account
          description: Get details for a specific bank account
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-account"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account-details
          description: Get routing number and full account number for a bank account
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-account-details"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account-balances
          description: Get real-time available and ledger balances for a bank account
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-account-balances"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-transactions
          description: List transactions for a bank account with date range filtering
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-transactions"
          with:
            account_id: "tools.account_id"
            count: "tools.count"
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-transaction
          description: Get a specific transaction record by ID
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-transaction"
          with:
            account_id: "tools.account_id"
            transaction_id: "tools.transaction_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-supported-institutions
          description: List all US financial institutions supported by Teller
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-institutions"
          outputParameters:
            - type: array
              mapping: "$."
