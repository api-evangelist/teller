      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: teller-accounts.deleteaccounts
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account
      description: Get Account
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teller-accounts.getaccount
      with:
        account_id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-account
      description: Delete Account
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: teller-accounts.deleteaccount
      with:
        account_id: tools.account_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-account-balances
      description: Get Account Balances
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teller-accounts.getaccountbalances
      with:
        account_id: tools.account_id
      outputParameters:
      - type: object
