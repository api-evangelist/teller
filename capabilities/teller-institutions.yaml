naftiko: 1.0.0-alpha2
info:
  label: Teller API — Institutions
  description: 'Teller API — Institutions. 1 operations. Lead operation: List Institutions. Self-contained Naftiko capability
    covering one Teller business surface.'
  tags:
  - Teller
  - Institutions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TELLER_API_KEY: TELLER_API_KEY
capability:
  consumes:
  - type: http
    namespace: teller-institutions
    baseUri: https://api.teller.io
    description: Teller API — Institutions business capability. Self-contained, no shared references.
    resources:
    - name: institutions
      path: /institutions
      operations:
      - name: listinstitutions
        method: GET
        description: List Institutions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.TELLER_API_KEY}}'
  exposes:
  - type: rest
    namespace: teller-institutions-rest
    port: 8080
    description: REST adapter for Teller API — Institutions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/institutions
      name: institutions
      description: REST surface for institutions.
      operations:
      - method: GET
        name: listinstitutions
        description: List Institutions
        call: teller-institutions.listinstitutions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teller-institutions-mcp
    port: 9090
    transport: http
    description: MCP adapter for Teller API — Institutions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-institutions
      description: List Institutions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teller-institutions.listinstitutions
      outputParameters:
      - type: object
        mapping: $.
