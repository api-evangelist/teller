naftiko: "1.0.0-alpha1"

info:
  label: Teller API
  description: >-
    Unified banking API for real-time access to bank accounts, transactions,
    balances, and identity data across US financial institutions. Secured with
    mTLS and per-user access tokens obtained via Teller Connect.
  tags:
    - Accounts
    - Banking
    - Financial Data
    - Identity
    - Open Banking
    - Teller
    - Transactions
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TELLER_ACCESS_TOKEN: TELLER_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: teller
      baseUri: https://api.teller.io
      description: Teller unified banking API for real-time financial data access.
      authentication:
        type: bearer
        token: "{{TELLER_ACCESS_TOKEN}}"
      resources:
        - name: identity
          path: /identity
          description: Account holder identity information
          operations:
            - name: list-identity
              method: GET
              description: List accounts with owner identity information attached
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
        - name: accounts
          path: /accounts
          description: Bank account management
          operations:
            - name: list-accounts
              method: GET
              description: List all authorized bank accounts
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: get-account
              method: GET
              description: Get a single bank account by ID
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: Account identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account-details
              method: GET
              description: Get account routing and account numbers
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: Account identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-account-balances
              method: GET
              description: Get current available and ledger balances
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: Account identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: transactions
          path: /accounts/{account_id}/transactions
          description: Account transaction history
          operations:
            - name: list-transactions
              method: GET
              description: List transactions for an account with optional date filtering
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: Account identifier
                - name: count
                  in: query
                  type: integer
                  required: false
                  description: Maximum transactions to return
                - name: from_id
                  in: query
                  type: string
                  required: false
                  description: Paginate backward from this transaction ID
                - name: start_date
                  in: query
                  type: string
                  required: false
                  description: Filter from this ISO 8601 date
                - name: end_date
                  in: query
                  type: string
                  required: false
                  description: Filter to this ISO 8601 date
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."
            - name: get-transaction
              method: GET
              description: Get a single transaction by ID
              inputParameters:
                - name: account_id
                  in: path
                  type: string
                  required: true
                  description: Account identifier
                - name: transaction_id
                  in: path
                  type: string
                  required: true
                  description: Transaction identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: institutions
          path: /institutions
          description: Supported financial institutions
          operations:
            - name: list-institutions
              method: GET
              description: List all supported financial institutions and their available products
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: array
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: teller-rest
      resources:
        - path: /v1/identity
          name: identity
          description: Account holder identity
          operations:
            - method: GET
              name: list-identity
              description: List accounts with owner identity
              call: "teller.list-identity"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/accounts
          name: accounts
          description: List bank accounts
          operations:
            - method: GET
              name: list-accounts
              description: List all authorized accounts
              call: "teller.list-accounts"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/accounts/{account_id}
          name: account
          description: Single bank account
          operations:
            - method: GET
              name: get-account
              description: Get account by ID
              call: "teller.get-account"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{account_id}/details
          name: account-details
          description: Account routing and account numbers
          operations:
            - method: GET
              name: get-account-details
              description: Get account routing details
              call: "teller.get-account-details"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{account_id}/balances
          name: account-balances
          description: Account balances
          operations:
            - method: GET
              name: get-account-balances
              description: Get account available and ledger balances
              call: "teller.get-account-balances"
              with:
                account_id: "rest.account_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/accounts/{account_id}/transactions
          name: transactions
          description: Account transactions
          operations:
            - method: GET
              name: list-transactions
              description: List account transactions
              call: "teller.list-transactions"
              with:
                account_id: "rest.account_id"
                count: "rest.count"
                start_date: "rest.start_date"
                end_date: "rest.end_date"
              outputParameters:
                - type: array
                  mapping: "$."
        - path: /v1/accounts/{account_id}/transactions/{transaction_id}
          name: transaction
          description: Single transaction
          operations:
            - method: GET
              name: get-transaction
              description: Get transaction by ID
              call: "teller.get-transaction"
              with:
                account_id: "rest.account_id"
                transaction_id: "rest.transaction_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/institutions
          name: institutions
          description: Supported financial institutions
          operations:
            - method: GET
              name: list-institutions
              description: List supported institutions
              call: "teller.list-institutions"
              outputParameters:
                - type: array
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: teller-mcp
      transport: http
      tools:
        - name: list-identity
          description: List bank accounts with owner identity information
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-identity"
          outputParameters:
            - type: array
              mapping: "$."
        - name: list-accounts
          description: List all authorized bank accounts
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-accounts"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-account
          description: Get a single bank account by ID
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-account"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account-details
          description: Get account routing and account numbers for a bank account
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-account-details"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-account-balances
          description: Get current available and ledger balances for an account
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-account-balances"
          with:
            account_id: "tools.account_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-transactions
          description: List transactions for a bank account with optional date filtering
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-transactions"
          with:
            account_id: "tools.account_id"
            count: "tools.count"
            start_date: "tools.start_date"
            end_date: "tools.end_date"
          outputParameters:
            - type: array
              mapping: "$."
        - name: get-transaction
          description: Get a single transaction by ID
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.get-transaction"
          with:
            account_id: "tools.account_id"
            transaction_id: "tools.transaction_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-institutions
          description: List all Teller-supported financial institutions
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: "teller.list-institutions"
          outputParameters:
            - type: array
              mapping: "$."
